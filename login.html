<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, viewport-fit=cover">

    <!-- font -->
    <link rel="stylesheet" href="fonts/fonts.css">
    <!-- Icons -->
    <link rel="stylesheet" href="icons/icomoon/style.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="css/styles.css">


    <!-- Favicon and Touch Icons  -->
    <link rel="shortcut icon" href="images/logo/40.png">
    <link rel="apple-touch-icon-precomposed" href="images/logo/40.png">

    <title>Ecobank Mobile</title>
</head>

<body>
    <!-- preloade -->
    <div class="preload preload-container">
        <div class="logo-img">
            <img src="images/logo/logo.svg" alt="">
        </div>
        <div class="spinner-circle lg success">
            <span class="spinner-circle1 spinner-child"></span>
            <span class="spinner-circle2 spinner-child"></span>
            <span class="spinner-circle3 spinner-child"></span>
            <span class="spinner-circle4 spinner-child"></span>
            <span class="spinner-circle5 spinner-child"></span>
            <span class="spinner-circle6 spinner-child"></span>
            <span class="spinner-circle7 spinner-child"></span>
            <span class="spinner-circle8 spinner-child"></span>
            <span class="spinner-circle9 spinner-child"></span>
        </div>
    </div>
    <!-- /preload -->
    <div class="wrap">
        <div class="tf-container">
            <form class="from-login" action="index.html">
                <div class="top-from">
                    <h4 class="title fw-6">Welcome back Emma</h4>
                    <div class="sub-title">Sign in to your Ecobank Mobile account.</div>
                </div>
                <div class="middle-from">
                    <fieldset class="mb-12 icon-absolute">
                        <i class="icon-mail"></i>
                        <input type="email" placeholder="Email">
                    </fieldset>
                    <fieldset class="box-auth-pass mb-12 tf-field icon-absolute">
                        <i class="icon-lock"></i>
                        <input type="password" placeholder=" " id="pass" class="password-field tf-field-input tf-input">
                        <label class="tf-field-label" for="pass">Password</label>
                        <span class="show-pass">
                            <span class="icon-eye"></span>
                            <span class="icon-eye-off"></span>
                        </span>
                    </fieldset>

                    <p>Forgot password? <a href="login.html">Reset it</a></p>
                </div>
                <div class="bottom-from">
                    <button type="submit" class="tf-btn primary mb-12">Sign In</button>
                    <a href="dashboard.html" class="tf-btn style-border btn-login-app mb-12">
                        <span class="icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <path d="M21.8055 10.0415H21V10H12V14H17.6515C16.827 16.3285 14.6115 18 12 18C8.6865 18 6 15.3135 6 12C6 8.6865 8.6865 6 12 6C13.5295 6 14.921 6.577 15.9805 7.5195L18.809 4.691C17.023 3.0265 14.634 2 12 2C6.4775 2 2 6.4775 2 12C2 17.5225 6.4775 22 12 22C17.5225 22 22 17.5225 22 12C22 11.3295 21.931 10.675 21.8055 10.0415Z" fill="#FFC107"></path>
                                <path d="M3.15302 7.3455L6.43851 9.755C7.32752 7.554 9.48052 6 12 6C13.5295 6 14.921 6.577 15.9805 7.5195L18.809 4.691C17.023 3.0265 14.634 2 12 2C8.15902 2 4.82802 4.1685 3.15302 7.3455Z" fill="#FF3D00"></path>
                                <path d="M12 21.9999C14.583 21.9999 16.93 21.0114 18.7045 19.4039L15.6095 16.7849C14.5718 17.5741 13.3038 18.0009 12 17.9999C9.39903 17.9999 7.19053 16.3414 6.35853 14.0269L3.09753 16.5394C4.75253 19.7779 8.11353 21.9999 12 21.9999Z" fill="#4CAF50"></path>
                                <path d="M21.8055 10.0415H21V10H12V14H17.6515C17.2571 15.1082 16.5467 16.0766 15.608 16.7855L15.6095 16.7845L18.7045 19.4035C18.4855 19.6025 22 17 22 12C22 11.3295 21.931 10.675 21.8055 10.0415Z" fill="#1976D2"></path>
                            </svg>
                        </span>
                        Sign in with Google
                    </a>
                    <a href="dashboard.html" class="tf-btn style-border btn-login-app">
                        <span class="icon">
                            <i class="icon-ant-design_apple-filled"></i>
                        </span>
                        Sign in with Apple
                    </a>
                </div>
                <div class="fixed-bottom-btn">
                </div>
            </form>

        </div>

    </div>

    <script type="text/javascript" src="js/jquery.min.js"></script>
    <script type="text/javascript" src="js/bootstrap.min.js"></script>
    <script type="text/javascript" src="js/count-down.js"></script>
    <script type="text/javascript" src="js/main.js"></script>



</body></html>
