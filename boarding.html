<!DOCTYPE html><html lang="en"><head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, viewport-fit=cover">

	<!-- font -->
	<link rel="stylesheet" href="css/fonts.css">
	<!-- Icons -->
	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/bootstrap.min.css">
	<link rel="stylesheet" href="css/swiper-bundle.min.css">
	<link rel="stylesheet" type="text/css" href="css/styles.css">


	<!-- Favicon and Touch Icons  -->
	<link rel="shortcut icon" href="images/40.png">
	<link rel="apple-touch-icon-precomposed" href="images/40.png">

	<title>Ecobank Mobile</title>
</head>

<body class="body-boarding">
	<div class="wg-boarding">
		<div class="header-boarding">
			<div class="swiper-pagination line-tes"></div>
			<a href="login.html" class="skip-btn">Skip</a>
		</div>
		<div dir="ltr" class="tf-swiper2 swiper sw-boarding mb-35" data-preview="1" data-space-between="20">
			<div class="swiper-wrapper">
				<div class="swiper-slide">
					<div class="image-boarding">
						<img loading="lazy" alt="img" width="320" height="371" src="images/boarding1.png">
					</div>
				</div>
				<div class="swiper-slide">
					<div class="image-boarding">
						<img loading="lazy" alt="img" width="320" height="366" src="images/boarding2.png">
					</div>
				</div>
				<div class="swiper-slide">
					<div class="image-boarding">
						<img loading="lazy" alt="img" width="320" height="366" src="images/boarding3.png">
					</div>
				</div>
			</div>
		</div>
		<div class="content">
			<div class="tf-container">
				<h4 class="title fw-6">
					Welcome to Ecobank
				</h4>
				<div class="desc">
					Your digital banking revolution starts here.
				</div>
				<a href="login.html" class="tf-btn primary">Get Started</a>
			</div>
		</div>
	</div>

	<script type="text/javascript" src="js/jquery.min.js"></script>
	<script type="text/javascript" src="js/bootstrap.min.js"></script>
	<script type="text/javascript" src="js/count-down.js"></script>
	<script src="js/swiper-bundle.min.js"></script>
	<script src="js/carousel.js"></script>
	<script type="text/javascript" src="js/main.js"></script>



</body></html>
